---
- name: "file type (cat) {{ cert_path }}"
  ansible.netcommon.cli_command:
    command: "file type {{ cert_path }}"
  register: cert_display
  failed_when: false

- name: Extract first PEM certificate from CLI output
  ansible.builtin.set_fact:
    cert_pem_block: "{{ cert_display.stdout | regex_search('(?s)-----BEGIN CERTIFICATE-----.*?-----END CERTIFICATE-----') | default('', true) }}"

- name: OpenSSL notAfter on controller
  ansible.builtin.command:
    argv:
      - openssl
      - x509
      - -noout
      - -enddate
      - -inform
      - PEM
    stdin: "{{ cert_pem_block }}"
  delegate_to: localhost
  register: cert_enddate
  changed_when: false
  failed_when: false
  when: cert_pem_block | length > 0

# When OpenSSL is skipped (no PEM), cert_enddate still holds the *previous* loop’s
# register — branch on cert_pem_block before reading cert_enddate.
- name: Build certificate report
  ansible.builtin.set_fact:
    cert_report:
      filesystem_path: "{{ cert_path }}"
      display_ok: "{{ (not (cert_display.failed | default(false))) | bool }}"
      pem_extracted: "{{ (cert_pem_block | length > 0) | bool }}"
      not_after: "{{ cert_not_after_line | trim }}"
  vars:
    cert_not_after_line: >-
      {% if cert_pem_block | length > 0 %}
      {% if (cert_enddate.rc | default(1)) == 0 and cert_enddate.stdout | default('') | length > 0 %}
      {{ cert_enddate.stdout | trim }}
      {% else %}
      openssl error (rc {{ cert_enddate.rc | default('?') }}): {{ cert_enddate.stderr | default('') | trim }}
      {% endif %}
      {% else %}
      No PEM found (wrong format, DER-only, or file read failed)
      {% endif %}

- name: Report certificate file status (pretty JSON)
  ansible.builtin.debug:
    msg: "{{ cert_report | to_nice_json }}"
